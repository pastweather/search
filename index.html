<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #21262d;
      --muted:     #30363d;
      --text:      #e6edf3;
      --subtle:    #8b949e;
      --accent:    #58a6ff;
      --accent2:   #79c0ff;
      --warm:      #f78166;
      --cool:      #56d364;
      --rain:      #79c0ff;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'Inter', sans-serif;
    }

    html { font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 4rem;
    }

    header {
      width: 100%;
      max-width: 880px;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
    }
    header h1 {
      font-family: var(--mono);
      font-size: 1.05rem;
      font-weight: 400;
      color: var(--subtle);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    header h1 span { color: var(--accent); }

    /* Unit toggle */
    .unit-toggle {
      display: inline-flex;
      border: 1px solid var(--muted);
      border-radius: 6px;
      overflow: hidden;
      font-family: var(--mono);
      font-size: 0.7rem;
    }
    .unit-toggle button {
      background: transparent;
      color: var(--subtle);
      border: none;
      padding: 0.35rem 0.7rem;
      cursor: pointer;
      letter-spacing: 0.04em;
    }
    .unit-toggle button.active {
      background: var(--accent);
      color: #0d1117;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.4rem;
      width: 100%;
      max-width: 880px;
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.68rem;
      font-family: var(--mono);
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.4rem;
    }

    /* Search row */
    .search-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .search-row .search-input { flex: 1; position: relative; }

    input[type="date"], input[type="text"], input[type="search"] {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--muted);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.9rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--accent); }
    input::placeholder { color: var(--muted); }

    button {
      font-family: var(--sans);
      font-size: 0.85rem;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      padding: 0.6rem 1rem;
      transition: opacity 0.15s, background 0.15s;
      white-space: nowrap;
    }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-locate {
      background: var(--muted);
      color: var(--text);
      flex-shrink: 0;
      padding: 0.6rem 0.85rem;
      font-size: 1rem;
    }
    .btn-locate:hover:not(:disabled) { background: #3a404a; }

    /* Geocoding results dropdown */
    .geo-results {
      list-style: none;
      margin-top: 0.4rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }
    .geo-results.visible { display: block; }
    .geo-results li {
      padding: 0.6rem 0.8rem;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.82rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .geo-results li:last-child { border-bottom: none; }
    .geo-results li:hover { background: rgba(88,166,255,0.08); }
    .geo-results li .geo-sub { color: var(--subtle); font-size: 0.74rem; }

    /* Selected location label */
    .loc-label {
      font-family: var(--mono);
      font-size: 0.82rem;
      color: var(--accent);
      margin-bottom: 1rem;
      min-height: 1.1rem;
    }
    .loc-label:empty { display: none; }

    /* Date + fetch row */
    .date-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.75rem;
      align-items: end;
    }
    @media (max-width: 560px) {
      .date-row { grid-template-columns: 1fr 1fr; }
      .date-row .btn-fetch { grid-column: span 2; }
    }

    .btn-fetch {
      background: var(--accent);
      color: #0d1117;
      width: 100%;
      padding: 0.62rem 1.25rem;
    }
    .btn-fetch:hover:not(:disabled) { background: var(--accent2); }

    /* Advanced toggle */
    .advanced-toggle {
      background: none;
      color: var(--subtle);
      font-family: var(--mono);
      font-size: 0.72rem;
      padding: 0;
      margin-top: 0.9rem;
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .advanced-toggle:hover { color: var(--text); }
    .manual-coords {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.8rem;
    }
    .manual-coords.visible { display: grid; }

    .status {
      font-family: var(--mono);
      font-size: 0.76rem;
      color: var(--subtle);
      margin-top: 0.9rem;
      min-height: 1rem;
    }
    .status.error { color: var(--warm); }

    /* Sparkline */
    #sparkline-wrap {
      display: none;
      margin-bottom: 1.1rem;
      width: 100%;
      max-width: 880px;
    }
    #sparkline-wrap.visible { display: block; }
    .spark-header {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }
    canvas#spark {
      width: 100%;
      height: 84px;
      display: block;
      border-radius: 6px;
    }

    /* Results */
    #results-wrap {
      display: none;
      width: 100%;
      max-width: 880px;
    }
    #results-wrap.visible { display: block; }

    .results-meta {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--subtle);
      margin-bottom: 0.75rem;
      letter-spacing: 0.04em;
    }
    .results-meta strong { color: var(--accent); font-weight: 500; }

    .table-scroll {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 70vh;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.78rem;
    }
    thead th {
      background: var(--surface);
      color: var(--subtle);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.66rem;
      font-weight: 500;
      padding: 0.65rem 0.85rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    tbody tr.hour-row { border-bottom: 1px solid var(--border); transition: background 0.08s; }
    tbody tr.hour-row:hover { background: rgba(88,166,255,0.04); }
    tbody td {
      padding: 0.45rem 0.85rem;
      color: var(--text);
      white-space: nowrap;
    }
    td.time-col { color: var(--subtle); }
    td.temp-col { font-weight: 500; }
    td.temp-hot  { color: var(--warm); }
    td.temp-cold { color: #6fa8dc; }
    td.rain-col  { color: var(--rain); }
    td.wind-col  { color: #c3e88d; }
    td.dim { color: var(--muted); }

    tr.day-divider td {
      background: #1c2230;
      color: var(--accent2);
      font-size: 0.74rem;
      letter-spacing: 0.05em;
      padding: 0.5rem 0.85rem;
      position: sticky;
      top: 33px;
      z-index: 1;
    }

    .wmo-desc { color: var(--subtle); font-size: 0.73rem; }

    footer {
      margin-top: 3rem;
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Weather <span>//</span> Archive</h1>
  <div class="unit-toggle" id="unit-toggle">
    <button data-units="metric" class="active">°C · km/h</button>
    <button data-units="imperial">°F · mph</button>
  </div>
</header>

<div class="card">
  <label for="place-input">Location</label>
  <div class="search-row">
    <div class="search-input">
      <input type="search" id="place-input" placeholder="Search a city or place…" autocomplete="off" />
    </div>
    <button class="btn-locate" id="btn-locate" aria-label="Use my current location" title="Use my current location">📍</button>
  </div>
  <ul class="geo-results" id="geo-results"></ul>

  <div class="loc-label" id="loc-label"></div>

  <div class="date-row">
    <div>
      <label for="date-start">From</label>
      <input type="date" id="date-start" />
    </div>
    <div>
      <label for="date-end">To</label>
      <input type="date" id="date-end" />
    </div>
    <div>
      <label>&nbsp;</label>
      <button class="btn-fetch" id="btn-fetch">Get weather</button>
    </div>
  </div>

  <button class="advanced-toggle" id="advanced-toggle">Enter coordinates manually</button>
  <div class="manual-coords" id="manual-coords">
    <div>
      <label for="lat-input">Latitude</label>
      <input type="text" id="lat-input" placeholder="51.2217" inputmode="decimal" />
    </div>
    <div>
      <label for="lon-input">Longitude</label>
      <input type="text" id="lon-input" placeholder="6.7762" inputmode="decimal" />
    </div>
  </div>

  <div class="status" id="status">Search for a place or tap 📍, pick your dates, and get the weather.</div>
</div>

<div id="sparkline-wrap">
  <div class="spark-header" id="spark-label">Temperature over period</div>
  <canvas id="spark"></canvas>
</div>

<div id="results-wrap">
  <div class="results-meta" id="results-meta"></div>
  <div class="table-scroll">
    <table id="results-table">
      <thead id="results-head"></thead>
      <tbody id="results-body"></tbody>
    </table>
  </div>
</div>

<footer>
  Data: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · No API key · Archive back to 1940
</footer>

<script>
// ---- WMO weather interpretation codes ----
const WMO = {
  0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Fog',48:'Icy fog',
  51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  56:'Freezing drizzle',57:'Heavy freezing drizzle',
  61:'Slight rain',63:'Rain',65:'Heavy rain',
  66:'Freezing rain',67:'Heavy freezing rain',
  71:'Slight snow',73:'Snow',75:'Heavy snow',77:'Snow grains',
  80:'Slight showers',81:'Showers',82:'Violent showers',
  85:'Slight snow showers',86:'Snow showers',
  95:'Thunderstorm',96:'Thunderstorm w/ hail',99:'Thunderstorm w/ heavy hail',
};

// ---- Units ----
const UNIT_PARAMS = {
  metric:   { temperature_unit:'celsius',    windspeed_unit:'kmh', precipitation_unit:'mm' },
  imperial: { temperature_unit:'fahrenheit', windspeed_unit:'mph', precipitation_unit:'inch' },
};
const UNIT_LABELS = {
  metric:   { temp:'°C', wind:'km/h', precip:'mm', vis:'km' },
  imperial: { temp:'°F', wind:'mph', precip:'in', vis:'mi' },
};
let units = 'metric';
let lastWeatherData = null;

// ---- Helpers ----
function windDir(deg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(deg / 22.5) % 16];
}
function tempClass(t) {
  if (t == null) return '';
  const c = units === 'imperial' ? (t - 32) * 5/9 : t; // normalize to °C for thresholds
  if (c >= 28) return 'temp-hot';
  if (c <= 5)  return 'temp-cold';
  return '';
}
function fmt(v, digits=1) { return v == null ? '—' : Number(v).toFixed(digits); }
function visConvert(m) {
  if (m == null) return '—';
  return units === 'imperial' ? (m/1609.34).toFixed(1) : (m/1000).toFixed(1);
}
function todayStr() { return new Date().toISOString().slice(0,10); }
function niceDate(dateStr) {
  return new Date(dateStr + 'T00:00').toLocaleDateString('en-US',
    { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

// ---- Init dates: yesterday -> today, block future ----
(function initDates() {
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  const f = d => d.toISOString().slice(0,10);
  const s = document.getElementById('date-start');
  const e = document.getElementById('date-end');
  s.value = f(yesterday);
  e.value = f(today);
  s.max = f(today);
  e.max = f(today);
})();

// ---- Unit toggle ----
document.getElementById('unit-toggle').addEventListener('click', (ev) => {
  const btn = ev.target.closest('button');
  if (!btn) return;
  units = btn.dataset.units;
  document.querySelectorAll('#unit-toggle button').forEach(b =>
    b.classList.toggle('active', b === btn));
  // Re-fetch with new units if we already have a location
  if (document.getElementById('lat-input').value) fetchWeather();
});

// ---- Advanced toggle ----
document.getElementById('advanced-toggle').addEventListener('click', () => {
  const m = document.getElementById('manual-coords');
  const open = m.classList.toggle('visible');
  document.getElementById('advanced-toggle').textContent =
    open ? 'Hide manual coordinates' : 'Enter coordinates manually';
});

// ---- Geocoding (place search) ----
const placeInput = document.getElementById('place-input');
const geoResults = document.getElementById('geo-results');

async function geocode(name) {
  const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=6&language=en&format=json`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocoding request failed');
  const data = await res.json();
  return data.results || [];
}

function showGeoResults(results) {
  geoResults.innerHTML = '';
  if (!results.length) {
    geoResults.classList.remove('visible');
    setStatus('No places found by that name. Try a different spelling.', true);
    return;
  }
  results.forEach(r => {
    const li = document.createElement('li');
    const sub = [r.admin1, r.country].filter(Boolean).join(', ');
    li.innerHTML = `${r.name} <span class="geo-sub">${sub}</span>`;
    li.addEventListener('click', () => selectPlace(r));
    geoResults.appendChild(li);
  });
  geoResults.classList.add('visible');
}

function selectPlace(r) {
  document.getElementById('lat-input').value = r.latitude.toFixed(4);
  document.getElementById('lon-input').value = r.longitude.toFixed(4);
  const sub = [r.admin1, r.country].filter(Boolean).join(', ');
  document.getElementById('loc-label').textContent = `📍 ${r.name}${sub ? ' · ' + sub : ''}`;
  geoResults.classList.remove('visible');
  placeInput.value = r.name;
  fetchWeather();
}

async function runSearch() {
  const name = placeInput.value.trim();
  if (!name) return;
  setStatus('Searching…');
  try {
    const results = await geocode(name);
    showGeoResults(results);
    if (results.length) setStatus('Pick a result above.');
  } catch (e) {
    setStatus('Could not reach the geocoding service. Check your connection.', true);
  }
}

placeInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.preventDefault(); runSearch(); }
});
placeInput.addEventListener('input', () => {
  if (!placeInput.value.trim()) geoResults.classList.remove('visible');
});

// ---- Geolocation ----
document.getElementById('btn-locate').addEventListener('click', () => {
  const btn = document.getElementById('btn-locate');
  if (!navigator.geolocation) {
    setStatus('Geolocation is not supported by this browser.', true);
    return;
  }
  btn.disabled = true;
  setStatus('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    pos => {
      const la = pos.coords.latitude, lo = pos.coords.longitude;
      document.getElementById('lat-input').value = la.toFixed(4);
      document.getElementById('lon-input').value = lo.toFixed(4);
      document.getElementById('loc-label').textContent =
        `📍 Your location · ${la.toFixed(3)}, ${lo.toFixed(3)}`;
      geoResults.classList.remove('visible');
      btn.disabled = false;
      fetchWeather();
    },
    err => { setStatus(`Location error: ${err.message}`, true); btn.disabled = false; },
    { timeout: 10000, enableHighAccuracy: false }
  );
});

// ---- Status helper ----
function setStatus(msg, isError=false) {
  const s = document.getElementById('status');
  s.textContent = msg;
  s.className = isError ? 'status error' : 'status';
}

// ---- Fetch weather ----
document.getElementById('btn-fetch').addEventListener('click', fetchWeather);

async function fetchWeather() {
  const lat = parseFloat(document.getElementById('lat-input').value);
  const lon = parseFloat(document.getElementById('lon-input').value);
  let start = document.getElementById('date-start').value;
  let end   = document.getElementById('date-end').value;
  const btn = document.getElementById('btn-fetch');

  if (isNaN(lat) || isNaN(lon)) {
    setStatus('Search for a place or tap 📍 first.', true); return;
  }
  if (!start || !end) { setStatus('Pick both a start and end date.', true); return; }
  if (start > end) { setStatus('The "From" date must be on or before the "To" date.', true); return; }

  const today = todayStr();
  if (end > today) end = today;          // no future actuals
  if (start > today) start = today;

  const dayDiff = (new Date(end) - new Date(start)) / 86400000;
  if (dayDiff > 31) { setStatus('Please keep the range to 31 days or fewer.', true); return; }

  btn.disabled = true;
  setStatus('Fetching from Open-Meteo…');

  // Endpoint choice: archive lags ~5 days, so use forecast API for anything
  // starting within the last ~90 days (covers "yesterday" and "earlier today").
  const startMs = new Date(start).getTime();
  const useArchive = startMs < (Date.now() - 90 * 86400000);

  const hourlyVars = [
    'temperature_2m','apparent_temperature','relative_humidity_2m',
    'precipitation','precipitation_probability',
    'windspeed_10m','winddirection_10m',
    'cloudcover','visibility','weathercode'
  ];
  const u = UNIT_PARAMS[units];
  const buildUrl = (archive) => {
    const p = new URLSearchParams({
      latitude: lat, longitude: lon,
      hourly: hourlyVars.join(','),
      timezone: 'auto', start_date: start, end_date: end,
      temperature_unit: u.temperature_unit,
      windspeed_unit: u.windspeed_unit,
      precipitation_unit: u.precipitation_unit,
    });
    const baseUrl = archive
      ? 'https://archive-api.open-meteo.com/v1/archive'
      : 'https://api.open-meteo.com/v1/forecast';
    return `${baseUrl}?${p}`;
  };

  async function tryFetch(archive) {
    const res = await fetch(buildUrl(archive));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  let data = null;
  try {
    data = await tryFetch(useArchive);
    // If the primary endpoint returned nothing, try the other one.
    if (!data.hourly || !data.hourly.time || !data.hourly.time.length) {
      data = await tryFetch(!useArchive);
    }
  } catch (e) {
    try { data = await tryFetch(!useArchive); }
    catch (e2) { setStatus(`Couldn't fetch weather: ${e2.message}`, true); btn.disabled = false; return; }
  }

  btn.disabled = false;

  if (!data.hourly || !data.hourly.time || !data.hourly.time.length) {
    setStatus('No data available for that location and date range.', true);
    return;
  }

  lastWeatherData = data;
  setStatus(`Loaded ${data.hourly.time.length} hourly records · ${data.timezone}`);
  renderSparkline(data);
  renderTable(data, lat, lon, start, end);
}

// ---- Sparkline ----
function renderSparkline(data) {
  const temps = data.hourly.temperature_2m;
  const wrap   = document.getElementById('sparkline-wrap');
  const label  = document.getElementById('spark-label');
  const canvas = document.getElementById('spark');

  wrap.classList.add('visible');
  label.textContent = `Temperature (${UNIT_LABELS[units].temp}) · ${data.timezone}`;

  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth || 800;
  const H = 84;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const valid = temps.filter(t => t != null);
  if (!valid.length) return;
  const minT = Math.min(...valid);
  const maxT = Math.max(...valid);
  const range = (maxT - minT) || 1;

  const pad = { l:4, r:4, t:8, b:20 };
  const gw = W - pad.l - pad.r;
  const gh = H - pad.t - pad.b;
  const n  = temps.length;
  const xAt = i => pad.l + (n > 1 ? (i/(n-1)) * gw : gw/2);
  const yAt = t => pad.t + (1 - (t - minT)/range) * gh;

  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  // area fill
  const grad = ctx.createLinearGradient(0, pad.t, 0, pad.t + gh);
  grad.addColorStop(0, 'rgba(88,166,255,0.25)');
  grad.addColorStop(1, 'rgba(88,166,255,0.00)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  let started = false, lastX = pad.l;
  temps.forEach((t, i) => {
    if (t == null) return;
    const x = xAt(i), y = yAt(t);
    if (!started) { ctx.moveTo(x, pad.t + gh); ctx.lineTo(x, y); started = true; }
    else ctx.lineTo(x, y);
    lastX = x;
  });
  if (started) { ctx.lineTo(lastX, pad.t + gh); ctx.closePath(); ctx.fill(); }

  // line
  ctx.strokeStyle = '#58a6ff';
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';
  ctx.beginPath();
  let first = true;
  temps.forEach((t, i) => {
    if (t == null) return;
    const x = xAt(i), y = yAt(t);
    first ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    first = false;
  });
  ctx.stroke();

  // min / max labels
  ctx.font = '10px IBM Plex Mono, monospace';
  ctx.fillStyle = '#8b949e';
  const lab = UNIT_LABELS[units].temp;
  ctx.fillText(`${minT.toFixed(1)}${lab}`, pad.l + 2, H - 4);
  const maxLabel = `${maxT.toFixed(1)}${lab}`;
  ctx.fillText(maxLabel, W - pad.r - ctx.measureText(maxLabel).width - 2, H - 4);
}

// redraw sparkline on resize
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { if (lastWeatherData) renderSparkline(lastWeatherData); }, 150);
});

// ---- Table ----
function renderTable(data, lat, lon, start, end) {
  const h = data.hourly;
  const head = document.getElementById('results-head');
  const tbody = document.getElementById('results-body');
  const meta  = document.getElementById('results-meta');
  const wrap  = document.getElementById('results-wrap');
  const L = UNIT_LABELS[units];

  wrap.classList.add('visible');
  meta.innerHTML = `<strong>${h.time.length} hours</strong> · ${lat.toFixed(3)}, ${lon.toFixed(3)} · ${start} → ${end} · ${data.timezone}`;

  head.innerHTML = `
    <tr>
      <th>Time</th>
      <th>Temp (${L.temp})</th>
      <th>Feels (${L.temp})</th>
      <th>Humidity</th>
      <th>Precip (${L.precip})</th>
      <th>Rain chance</th>
      <th>Wind (${L.wind})</th>
      <th>Dir</th>
      <th>Cloud</th>
      <th>Visibility (${L.vis})</th>
      <th>Conditions</th>
    </tr>`;

  tbody.innerHTML = '';
  let currentDay = null;

  h.time.forEach((t, i) => {
    const dayPart  = t.slice(0, 10);
    const timePart = t.slice(11, 16);

    if (dayPart !== currentDay) {
      currentDay = dayPart;
      const dr = document.createElement('tr');
      dr.className = 'day-divider';
      dr.innerHTML = `<td colspan="11">${niceDate(dayPart)}</td>`;
      tbody.appendChild(dr);
    }

    const temp   = h.temperature_2m?.[i];
    const feels  = h.apparent_temperature?.[i];
    const hum    = h.relative_humidity_2m?.[i];
    const precip = h.precipitation?.[i];
    const pprob  = h.precipitation_probability?.[i];
    const wspd   = h.windspeed_10m?.[i];
    const wdir   = h.winddirection_10m?.[i];
    const cloud  = h.cloudcover?.[i];
    const vis    = h.visibility?.[i];
    const wmo    = h.weathercode?.[i];
    const isRainy = precip != null && precip > 0;

    const tr = document.createElement('tr');
    tr.className = 'hour-row';
    tr.innerHTML = `
      <td class="time-col">${timePart}</td>
      <td class="temp-col ${tempClass(temp)}">${fmt(temp)}°</td>
      <td class="temp-col ${tempClass(feels)}">${fmt(feels)}°</td>
      <td>${fmt(hum,0)}%</td>
      <td class="rain-col">${isRainy ? fmt(precip,2) : '<span class="dim">—</span>'}</td>
      <td>${pprob != null ? fmt(pprob,0)+'%' : '<span class="dim">—</span>'}</td>
      <td class="wind-col">${fmt(wspd)}</td>
      <td style="color:var(--subtle)">${wdir != null ? windDir(wdir) : '—'}</td>
      <td>${cloud != null ? fmt(cloud,0)+'%' : '—'}</td>
      <td>${visConvert(vis)}</td>
      <td class="wmo-desc">${WMO[wmo] ?? (wmo ?? '—')}</td>
    `;
    tbody.appendChild(tr);
  });
}
</script>
