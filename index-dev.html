<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:#0d1117; --surface:#161b22; --border:#21262d; --muted:#30363d;
      --text:#e6edf3; --subtle:#8b949e; --accent:#58a6ff; --accent2:#79c0ff;
      --warm:#f78166; --cool:#56d364; --rain:#79c0ff;
      --mono:'IBM Plex Mono', monospace; --sans:'Inter', sans-serif;
    }
    html { font-size:16px; }
    body {
      background:var(--bg); color:var(--text); font-family:var(--sans);
      min-height:100vh; display:flex; flex-direction:column; align-items:center;
      padding:1.75rem 1rem 3.5rem;
    }

    .shell { width:100%; max-width:min(86rem, 96vw); }

    header {
      width:100%; max-width:min(86rem,96vw); margin-bottom:1.5rem;
      border-bottom:1px solid var(--border); padding-bottom:1rem;
      display:flex; justify-content:space-between; align-items:baseline; gap:1rem; flex-wrap:wrap;
    }
    header h1 {
      font-family:var(--mono); font-size:1.05rem; font-weight:400; color:var(--subtle);
      letter-spacing:0.08em; text-transform:uppercase;
    }
    header h1 span { color:var(--accent); }
    .ver { font-family:var(--mono); font-size:0.66rem; color:var(--muted); margin-left:0.5rem; }

    /* Segmented controls */
    .seg, .unit-toggle {
      display:inline-flex; border:1px solid var(--muted); border-radius:6px;
      overflow:hidden; font-family:var(--mono); font-size:0.72rem;
    }
    .seg button, .unit-toggle button {
      background:transparent; color:var(--subtle); border:none;
      padding:0.4rem 0.8rem; cursor:pointer; letter-spacing:0.03em;
    }
    .seg button.active, .unit-toggle button.active { background:var(--accent); color:#0d1117; }

    .card {
      background:var(--surface); border:1px solid var(--border); border-radius:10px;
      padding:1.3rem; width:100%; margin-bottom:1.1rem;
    }

    label {
      display:block; font-size:0.66rem; font-family:var(--mono); color:var(--subtle);
      text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.4rem;
    }

    .search-row { display:flex; gap:0.5rem; }
    .search-row .search-input { flex:1; }

    input[type="date"], input[type="text"], input[type="search"] {
      width:100%; background:var(--bg); border:1px solid var(--muted); border-radius:6px;
      color:var(--text); font-family:var(--mono); font-size:0.9rem; padding:0.55rem 0.8rem;
      outline:none; transition:border-color 0.15s;
    }
    input:focus { border-color:var(--accent); }
    input::placeholder { color:var(--muted); }

    button { font-family:var(--sans); font-size:0.85rem; font-weight:500; border:none;
      border-radius:6px; cursor:pointer; padding:0.55rem 1rem; transition:opacity 0.15s, background 0.15s;
      white-space:nowrap; }
    button:disabled { opacity:0.45; cursor:not-allowed; }

    .btn-locate { background:var(--muted); color:var(--text); flex-shrink:0; padding:0.55rem 0.8rem; font-size:1rem; }
    .btn-locate:hover:not(:disabled) { background:#3a404a; }

    .geo-results { list-style:none; margin-top:0.4rem; border:1px solid var(--border);
      border-radius:6px; overflow:hidden; display:none; }
    .geo-results.visible { display:block; }
    .geo-results li { padding:0.55rem 0.8rem; cursor:pointer; font-family:var(--mono);
      font-size:0.82rem; border-bottom:1px solid var(--border); transition:background 0.1s; }
    .geo-results li:last-child { border-bottom:none; }
    .geo-results li:hover { background:rgba(88,166,255,0.08); }
    .geo-results li .geo-sub { color:var(--subtle); font-size:0.74rem; }

    .loc-label { font-family:var(--mono); font-size:0.82rem; color:var(--accent); margin-top:0.8rem; min-height:1.1rem; }
    .loc-label:empty { display:none; margin:0; }

    .mode-row { margin-top:1.1rem; }
    .date-area { margin-top:0.9rem; display:flex; flex-direction:column; gap:0.9rem; }
    .date-fields { display:flex; flex-wrap:wrap; gap:0.85rem; align-items:end; }
    .date-fields > div { flex:0 0 auto; }
    .view-toggle-wrap { align-self:end; }
    .btn-fetch { background:var(--accent); color:#0d1117; align-self:flex-start; padding:0.58rem 1.5rem; }
    .btn-fetch:hover:not(:disabled) { background:var(--accent2); }

    .advanced-toggle { background:none; color:var(--subtle); font-family:var(--mono);
      font-size:0.72rem; padding:0; margin-top:0.9rem; text-decoration:underline; text-underline-offset:3px; }
    .advanced-toggle:hover { color:var(--text); }
    .manual-coords { display:none; grid-template-columns:1fr 1fr; gap:0.75rem; margin-top:0.8rem; }
    .manual-coords.visible { display:grid; }

    .status { font-family:var(--mono); font-size:0.76rem; color:var(--subtle); margin-top:0.9rem; min-height:1rem; }
    .status.error { color:var(--warm); }

    /* Results layout */
    .results-layout { display:grid; grid-template-columns:1fr; gap:1.1rem; }
    @media (min-width:67.5em) {
      .results-layout { grid-template-columns:minmax(0,1fr) 20rem; align-items:start; }
    }
    .main-col { display:flex; flex-direction:column; min-width:0; }
    .side-col { display:flex; flex-direction:column; }

    /* Chart */
    .chart-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.75rem; flex-wrap:wrap; gap:0.5rem; }
    .chart-title { font-family:var(--mono); font-size:0.7rem; color:var(--subtle); text-transform:uppercase; letter-spacing:0.06em; }
    .chart-legend { display:flex; gap:0.9rem; font-family:var(--mono); font-size:0.72rem; color:var(--subtle); }
    .chart-legend .lg { display:inline-flex; align-items:center; gap:0.35rem; }
    .chart-legend .lg-dot { width:9px; height:9px; border-radius:2px; }
    .chart-wrap { position:relative; width:100%; }
    canvas#chart { width:100%; height:15rem; display:block; }
    @media (max-width:35em) { canvas#chart { height:13rem; } }
    .chart-tip {
      position:absolute; display:none; pointer-events:none; background:#0d1117f2;
      border:1px solid var(--muted); border-radius:6px; padding:0.5rem 0.65rem;
      font-family:var(--mono); font-size:0.74rem; color:var(--text); z-index:5; min-width:120px;
    }
    .chart-tip .tip-x { color:var(--accent2); margin-bottom:0.3rem; font-size:0.72rem; }
    .chart-tip .tip-row { display:flex; align-items:center; gap:0.4rem; }
    .chart-tip .tip-dot { width:8px; height:8px; border-radius:2px; display:inline-block; }

    /* Table */
    .table-head { display:flex; justify-content:space-between; align-items:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:0.75rem; }
    .table-actions { display:flex; align-items:center; gap:0.85rem; }
    .chk { display:inline-flex; align-items:center; gap:0.4rem; font-family:var(--mono); font-size:0.74rem; color:var(--subtle); margin:0; text-transform:none; letter-spacing:0; cursor:pointer; }
    .chk input { width:auto; }
    .btn-csv { background:var(--muted); color:var(--text); font-size:0.76rem; padding:0.45rem 0.85rem; }
    .btn-csv:hover { background:#3a404a; }

    .results-meta { font-family:var(--mono); font-size:0.72rem; color:var(--subtle); letter-spacing:0.03em; }
    .results-meta strong { color:var(--accent); font-weight:500; }

    .table-scroll { overflow-x:auto; border:1px solid var(--border); border-radius:8px; max-height:62vh; }
    table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:0.77rem; }
    thead th { background:var(--surface); color:var(--subtle); text-transform:uppercase;
      letter-spacing:0.03em; font-size:0.64rem; font-weight:500; padding:0.6rem 0.6rem;
      text-align:left; border-bottom:1px solid var(--border); white-space:nowrap;
      position:sticky; top:0; z-index:2; }
    tbody tr.hour-row { border-bottom:1px solid var(--border); transition:background 0.08s; }
    tbody tr.hour-row:hover { background:rgba(88,166,255,0.04); }
    tbody td { padding:0.4rem 0.6rem; color:var(--text); white-space:nowrap; }
    td.time-col { color:var(--subtle); }
    td.temp-col { font-weight:500; }
    td.temp-hot { color:var(--warm); }
    td.temp-cold { color:#6fa8dc; }
    td.rain-col { color:var(--rain); }
    td.wind-col { color:#c3e88d; }
    td.heat-col { color:#ffab70; }
    td.dim { color:var(--muted); }
    tr.day-divider td { background:#1c2230; color:var(--accent2); font-size:0.73rem;
      letter-spacing:0.04em; padding:0.45rem 0.7rem; position:sticky; top:var(--thead-h, 2rem); z-index:1; }
    .wmo-desc { color:var(--subtle); font-size:0.72rem; }

    .legend { margin-top:0.9rem; font-family:var(--sans); }
    .legend summary { cursor:pointer; font-family:var(--mono); font-size:0.74rem; color:var(--subtle); }
    .legend summary:hover { color:var(--text); }
    .legend-body { margin-top:0.7rem; font-size:0.82rem; color:var(--subtle); line-height:1.5; }
    .legend-body p { margin-bottom:0.55rem; }
    .legend-body strong { color:var(--text); font-weight:500; }

    /* Side panel */
    .side-title { font-family:var(--mono); font-size:0.68rem; color:var(--subtle);
      text-transform:uppercase; letter-spacing:0.06em; margin-bottom:0.85rem;
      border-bottom:1px solid var(--border); padding-bottom:0.55rem; }
    .stat { display:flex; justify-content:space-between; gap:0.75rem; font-family:var(--mono);
      font-size:0.8rem; padding:0.32rem 0; }
    .stat .k { color:var(--subtle); }
    .stat .v { color:var(--text); text-align:right; }
    .stat .v.hot { color:var(--warm); }
    .stat .v.cold { color:#6fa8dc; }
    .stat .v.rain { color:var(--rain); }
    .btn-records { background:var(--accent); color:#0d1117; width:100%; padding:0.55rem; font-size:0.8rem; }
    .btn-records:hover:not(:disabled) { background:var(--accent2); }
    .records-note { font-family:var(--mono); font-size:0.7rem; color:var(--muted); margin-top:0.6rem; line-height:1.4; }

    footer { margin-top:2.5rem; font-family:var(--mono); font-size:0.68rem; color:var(--muted); text-align:center; }
    footer a { color:var(--muted); }
  </style>
</head>
<body>

<header>
  <h1>Weather <span>//</span> Archive <span class="ver">v0.2.0-rc.1</span></h1>
  <div class="unit-toggle" id="unit-toggle">
    <button data-units="metric" class="active">°C · km/h</button>
    <button data-units="imperial">°F · mph</button>
  </div>
</header>

<div class="shell">
  <!-- CONTROLS -->
  <div class="card">
    <label for="place-input">Location</label>
    <div class="search-row">
      <div class="search-input"><input type="search" id="place-input" placeholder="Search a city or place…" autocomplete="off" /></div>
      <button class="btn-locate" id="btn-locate" aria-label="Use my current location" title="Use my current location">📍</button>
    </div>
    <ul class="geo-results" id="geo-results"></ul>
    <div class="loc-label" id="loc-label"></div>

    <div class="mode-row">
      <div class="seg" id="mode-toggle">
        <button data-mode="single" class="active">Single day</button>
        <button data-mode="range">Date range</button>
      </div>
    </div>

    <div class="date-area">
      <div class="date-fields" id="single-fields">
        <div>
          <label for="single-date">Date</label>
          <input type="date" id="single-date" />
        </div>
      </div>
      <div class="date-fields" id="range-fields" style="display:none;">
        <div>
          <label for="date-start">From</label>
          <input type="date" id="date-start" />
        </div>
        <div>
          <label for="date-end">To</label>
          <input type="date" id="date-end" />
        </div>
        <div class="view-toggle-wrap">
          <label>View</label>
          <div class="seg" id="view-toggle">
            <button data-view="hourly" class="active">Hourly</button>
            <button data-view="daily">Daily</button>
          </div>
        </div>
      </div>
      <button class="btn-fetch" id="btn-fetch">Get weather</button>
    </div>

    <button class="advanced-toggle" id="advanced-toggle">Enter coordinates manually</button>
    <div class="manual-coords" id="manual-coords">
      <div><label for="lat-input">Latitude</label><input type="text" id="lat-input" placeholder="51.2217" inputmode="decimal" /></div>
      <div><label for="lon-input">Longitude</label><input type="text" id="lon-input" placeholder="6.7762" inputmode="decimal" /></div>
    </div>

    <div class="status" id="status">Search for a place or tap 📍, choose a day or range, and get the weather.</div>
  </div>

  <!-- RESULTS -->
  <div class="results-layout">
    <div class="main-col">
      <div class="card chart-card" id="chart-card" style="display:none;">
        <div class="chart-head">
          <div class="chart-title" id="chart-title">Temperature</div>
          <div class="chart-legend" id="chart-legend"></div>
        </div>
        <div class="chart-wrap" id="chart-wrap">
          <canvas id="chart"></canvas>
          <div class="chart-tip" id="chart-tip"></div>
        </div>
      </div>

      <div class="card table-card" id="table-card" style="display:none;">
        <div class="table-head">
          <div class="results-meta" id="results-meta"></div>
          <div class="table-actions">
            <label class="chk" id="heat-chk"><input type="checkbox" id="heat-toggle" /> Heat metrics</label>
            <button class="btn-csv" id="btn-csv">Download CSV</button>
          </div>
        </div>
        <div class="table-scroll">
          <table><thead id="results-head"></thead><tbody id="results-body"></tbody></table>
        </div>
        <details class="legend">
          <summary>What do these columns mean?</summary>
          <div class="legend-body" id="legend-body"></div>
        </details>
      </div>
    </div>

    <aside class="side-col" id="side-col" style="display:none;">
      <div class="card">
        <div class="side-title">Summary</div>
        <div id="summary-body"></div>
      </div>
      <div class="card">
        <div class="side-title">All-time records</div>
        <div id="records-body">
          <button class="btn-records" id="btn-records">Load records</button>
          <div class="records-note" id="records-note"></div>
        </div>
      </div>
      <div class="card">
        <div class="side-title">Location</div>
        <div id="facts-body"></div>
      </div>
    </aside>
  </div>
</div>

<footer>
  Data: <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · No API key · Archive back to 1940 · v0.2.0-rc.1
</footer>

<script>
// ===== WMO codes =====
const WMO = {0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Fog',48:'Icy fog',
  51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',56:'Freezing drizzle',57:'Heavy freezing drizzle',
  61:'Slight rain',63:'Rain',65:'Heavy rain',66:'Freezing rain',67:'Heavy freezing rain',
  71:'Slight snow',73:'Snow',75:'Heavy snow',77:'Snow grains',80:'Slight showers',81:'Showers',
  82:'Violent showers',85:'Slight snow showers',86:'Snow showers',95:'Thunderstorm',
  96:'Thunderstorm w/ hail',99:'Thunderstorm w/ heavy hail'};

// ===== Units =====
const UNIT_PARAMS = {
  metric:   { temperature_unit:'celsius',    windspeed_unit:'kmh', precipitation_unit:'mm' },
  imperial: { temperature_unit:'fahrenheit', windspeed_unit:'mph', precipitation_unit:'inch' },
};
const UNIT_LABELS = {
  metric:   { temp:'°C', wind:'km/h', precip:'mm', vis:'km', elev:'m' },
  imperial: { temp:'°F', wind:'mph', precip:'in', vis:'mi', elev:'ft' },
};

// ===== State =====
let units = 'metric';
let currentMode = 'single';   // 'single' | 'range'
let currentView = 'hourly';   // for range: 'hourly' | 'daily'
let heatMetrics = false;
let lastWeatherData = null;
let lastContext = null;       // {lat,lon,start,end,effView}
let recordsLoaded = false;

// ===== Unit conversions for derived metrics =====
function toC(t){ if(t==null) return null; return units==='imperial' ? (t-32)*5/9 : t; }
function fromC(c){ if(c==null) return null; return units==='imperial' ? c*9/5+32 : c; }
function toF(t){ if(t==null) return null; return units==='imperial' ? t : t*9/5+32; }
function fromF(f){ if(f==null) return null; return units==='imperial' ? f : (f-32)*5/9; }

// ===== Derived heat metrics =====
function calcHeatIndex(tDisp, rh){
  if(tDisp==null || rh==null) return null;
  const T = toF(tDisp);
  let hi = 0.5*(T + 61 + (T-68)*1.2 + rh*0.094);
  hi = (hi + T)/2;
  if(hi >= 80){
    let HI = -42.379 + 2.04901523*T + 10.14333127*rh - 0.22475541*T*rh
      - 0.00683783*T*T - 0.05481717*rh*rh + 0.00122874*T*T*rh
      + 0.00085282*T*rh*rh - 0.00000199*T*T*rh*rh;
    if(rh < 13 && T >= 80 && T <= 112)
      HI -= ((13-rh)/4) * Math.sqrt((17 - Math.abs(T-95))/17);
    else if(rh > 85 && T >= 80 && T <= 87)
      HI += ((rh-85)/10) * ((87-T)/5);
    hi = HI;
  }
  return fromF(hi);
}
function calcWetBulb(tDisp, rh){
  if(tDisp==null || rh==null) return null;
  const T = toC(tDisp);
  const Tw = T*Math.atan(0.151977*Math.sqrt(rh+8.313659))
    + Math.atan(T+rh) - Math.atan(rh-1.676331)
    + 0.00391838*Math.pow(rh,1.5)*Math.atan(0.023101*rh) - 4.686035;
  return fromC(Tw);
}
function calcWBGTshade(tDisp, rh){
  const TwDisp = calcWetBulb(tDisp, rh);
  if(TwDisp==null || tDisp==null) return null;
  return fromC(0.7*toC(TwDisp) + 0.3*toC(tDisp));
}

// ===== Misc helpers =====
function windDir(deg){ const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW']; return d[Math.round(deg/22.5)%16]; }
function tempClass(t){ if(t==null) return ''; const c=toC(t); if(c>=28) return 'temp-hot'; if(c<=5) return 'temp-cold'; return ''; }
function fmt(v, d=1){ return v==null ? '—' : Number(v).toFixed(d); }
function visConvert(m){ if(m==null) return '—'; return units==='imperial' ? (m/1609.34).toFixed(1) : (m/1000).toFixed(1); }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function parts(iso){ const [date,time=''] = iso.split('T'); const [y,m,d]=date.split('-').map(Number); return {y,m,d,hm:time.slice(0,5)}; }
function mdShort(iso){ const p=parts(iso); return `${p.m}/${p.d}`; }
function hmShort(iso){ return parts(iso).hm; }
function fullHour(iso){ const p=parts(iso); const dt=new Date(p.y,p.m-1,p.d); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})+', '+p.hm; }
function fullDay(iso){ const p=parts(iso); const dt=new Date(p.y,p.m-1,p.d); return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}); }
function compactDay(iso){ const p=parts(iso); const dt=new Date(p.y,p.m-1,p.d); return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }
function niceDateLong(dateStr){ const [y,m,d]=dateStr.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function monthDayLabel(dateStr){ const [y,m,d]=dateStr.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{month:'long',day:'numeric'}); }
function niceStep(range, target){
  if(range<=0) return 1;
  const raw=range/target, mag=Math.pow(10,Math.floor(Math.log10(raw))), norm=raw/mag;
  let s; if(norm<1.5) s=1; else if(norm<3) s=2; else if(norm<7) s=5; else s=10;
  return s*mag;
}

// ===== Init dates =====
(function(){
  const today=new Date();
  const f=d=>d.toISOString().slice(0,10);
  const yest=new Date(today); yest.setDate(today.getDate()-1);
  const weekAgo=new Date(today); weekAgo.setDate(today.getDate()-6);
  document.getElementById('single-date').value=f(yest);
  document.getElementById('date-start').value=f(weekAgo);
  document.getElementById('date-end').value=f(today);
  ['single-date','date-start','date-end'].forEach(id=>document.getElementById(id).max=f(today));
})();

// ===== Toggles =====
document.getElementById('unit-toggle').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  units=b.dataset.units;
  document.querySelectorAll('#unit-toggle button').forEach(x=>x.classList.toggle('active',x===b));
  if(document.getElementById('lat-input').value){ fetchWeather().then(()=>{ if(recordsLoaded) loadRecords(); }); }
});
document.getElementById('mode-toggle').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  currentMode=b.dataset.mode;
  document.querySelectorAll('#mode-toggle button').forEach(x=>x.classList.toggle('active',x===b));
  document.getElementById('single-fields').style.display = currentMode==='single' ? 'flex' : 'none';
  document.getElementById('range-fields').style.display = currentMode==='range' ? 'flex' : 'none';
});
document.getElementById('view-toggle').addEventListener('click', e=>{
  const b=e.target.closest('button'); if(!b) return;
  currentView=b.dataset.view;
  document.querySelectorAll('#view-toggle button').forEach(x=>x.classList.toggle('active',x===b));
});
document.getElementById('advanced-toggle').addEventListener('click', ()=>{
  const m=document.getElementById('manual-coords');
  const open=m.classList.toggle('visible');
  document.getElementById('advanced-toggle').textContent = open ? 'Hide manual coordinates' : 'Enter coordinates manually';
});
document.getElementById('heat-toggle').addEventListener('change', e=>{ heatMetrics=e.target.checked; renderResults(); });

// ===== Geocoding =====
const placeInput=document.getElementById('place-input');
const geoResults=document.getElementById('geo-results');
async function geocode(name){
  const url=`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=6&language=en&format=json`;
  const res=await fetch(url); if(!res.ok) throw new Error('Geocoding request failed');
  const data=await res.json(); return data.results||[];
}
function showGeoResults(results){
  geoResults.innerHTML='';
  if(!results.length){ geoResults.classList.remove('visible'); setStatus('No places found by that name. Try a different spelling.',true); return; }
  results.forEach(r=>{
    const li=document.createElement('li');
    const sub=[r.admin1,r.country].filter(Boolean).join(', ');
    li.innerHTML=`${r.name} <span class="geo-sub">${sub}</span>`;
    li.addEventListener('click',()=>selectPlace(r));
    geoResults.appendChild(li);
  });
  geoResults.classList.add('visible');
}
function selectPlace(r){
  document.getElementById('lat-input').value=r.latitude.toFixed(4);
  document.getElementById('lon-input').value=r.longitude.toFixed(4);
  const sub=[r.admin1,r.country].filter(Boolean).join(', ');
  document.getElementById('loc-label').textContent=`📍 ${r.name}${sub?' · '+sub:''}`;
  geoResults.classList.remove('visible'); placeInput.value=r.name;
  recordsLoaded=false; resetRecordsCard();
  fetchWeather();
}
async function runSearch(){
  const name=placeInput.value.trim(); if(!name) return;
  setStatus('Searching…');
  try{ const results=await geocode(name); showGeoResults(results); if(results.length) setStatus('Pick a result above.'); }
  catch(e){ setStatus('Could not reach the geocoding service. Check your connection.',true); }
}
placeInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); runSearch(); }});
placeInput.addEventListener('input', ()=>{ if(!placeInput.value.trim()) geoResults.classList.remove('visible'); });

// ===== Geolocation =====
document.getElementById('btn-locate').addEventListener('click', ()=>{
  const btn=document.getElementById('btn-locate');
  if(!navigator.geolocation){ setStatus('Geolocation is not supported by this browser.',true); return; }
  btn.disabled=true; setStatus('Getting your location…');
  navigator.geolocation.getCurrentPosition(
    pos=>{ const la=pos.coords.latitude, lo=pos.coords.longitude;
      document.getElementById('lat-input').value=la.toFixed(4);
      document.getElementById('lon-input').value=lo.toFixed(4);
      document.getElementById('loc-label').textContent=`📍 Your location · ${la.toFixed(3)}, ${lo.toFixed(3)}`;
      geoResults.classList.remove('visible'); btn.disabled=false;
      recordsLoaded=false; resetRecordsCard(); fetchWeather(); },
    err=>{ setStatus(`Location error: ${err.message}`,true); btn.disabled=false; },
    { timeout:10000, enableHighAccuracy:false });
});

function setStatus(msg, isError=false){ const s=document.getElementById('status'); s.textContent=msg; s.className=isError?'status error':'status'; }

// ===== Fetch weather =====
document.getElementById('btn-fetch').addEventListener('click', ()=>{ recordsLoaded=false; resetRecordsCard(); fetchWeather(); });

async function fetchWeather(){
  const lat=parseFloat(document.getElementById('lat-input').value);
  const lon=parseFloat(document.getElementById('lon-input').value);
  const btn=document.getElementById('btn-fetch');
  if(isNaN(lat)||isNaN(lon)){ setStatus('Search for a place or tap 📍 first.',true); return; }

  let start, end, effView;
  if(currentMode==='single'){
    start = end = document.getElementById('single-date').value;
    effView = 'hourly';
  } else {
    start = document.getElementById('date-start').value;
    end   = document.getElementById('date-end').value;
    effView = currentView;
  }
  if(!start || !end){ setStatus('Pick your date(s) first.',true); return; }
  if(start>end){ setStatus('The "From" date must be on or before the "To" date.',true); return; }

  const today=todayStr();
  if(end>today) end=today;
  if(start>today) start=today;
  const dayDiff=(new Date(end)-new Date(start))/86400000;
  if(dayDiff>31){ setStatus('Please keep the range to 31 days or fewer (records below cover longer spans).',true); return; }

  btn.disabled=true; setStatus('Fetching from Open-Meteo…');
  const u=UNIT_PARAMS[units];
  const startMs=new Date(start).getTime();
  const useArchive = startMs < (Date.now() - 90*86400000);

  const hourlyVars=['temperature_2m','apparent_temperature','relative_humidity_2m','precipitation',
    'precipitation_probability','windspeed_10m','winddirection_10m','cloudcover','visibility','weathercode'];
  const dailyVars=['temperature_2m_max','temperature_2m_min','temperature_2m_mean',
    'apparent_temperature_max','apparent_temperature_min','precipitation_sum','precipitation_hours',
    'windspeed_10m_max','winddirection_10m_dominant','weathercode','sunrise','sunset'];

  const buildUrl=(archive)=>{
    const p=new URLSearchParams({ latitude:lat, longitude:lon, timezone:'auto',
      start_date:start, end_date:end,
      temperature_unit:u.temperature_unit, windspeed_unit:u.windspeed_unit, precipitation_unit:u.precipitation_unit });
    if(effView==='daily') p.set('daily', dailyVars.join(','));
    else p.set('hourly', hourlyVars.join(','));
    const base=archive ? 'https://archive-api.open-meteo.com/v1/archive' : 'https://api.open-meteo.com/v1/forecast';
    return `${base}?${p}`;
  };
  const block=(d)=> effView==='daily' ? d.daily : d.hourly;
  async function tryFetch(archive){ const r=await fetch(buildUrl(archive)); if(!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }

  let data=null;
  try{
    data=await tryFetch(useArchive);
    const b=block(data);
    if(!b || !b.time || !b.time.length) data=await tryFetch(!useArchive);
  }catch(e){
    try{ data=await tryFetch(!useArchive); }
    catch(e2){ setStatus(`Couldn't fetch weather: ${e2.message}`,true); btn.disabled=false; return; }
  }
  btn.disabled=false;
  const b=block(data);
  if(!b || !b.time || !b.time.length){ setStatus('No data available for that location and date range.',true); return; }

  lastWeatherData=data;
  lastContext={ lat, lon, start, end, effView };
  setStatus(`Loaded ${b.time.length} ${effView} records · ${data.timezone}`);
  renderResults();
}

// ===== Render dispatch =====
function renderResults(){
  const d=lastWeatherData, c=lastContext; if(!d||!c) return;
  document.getElementById('chart-card').style.display='';
  document.getElementById('table-card').style.display='';
  document.getElementById('side-col').style.display='';
  // heat metrics toggle only relevant for hourly
  document.getElementById('heat-chk').style.display = c.effView==='hourly' ? 'inline-flex' : 'none';

  if(c.effView==='daily') renderDaily(d,c); else renderHourly(d,c);
  renderSummary(d,c);
  renderFacts(d,c);
  updateRecordsButton(c);
}

function setLegend(seriesNames){
  const lg=document.getElementById('chart-legend');
  lg.innerHTML=seriesNames.map(s=>`<span class="lg"><span class="lg-dot" style="background:${s.color}"></span>${s.name}</span>`).join('');
}

// ===== Hourly =====
function renderHourly(d,c){
  const h=d.hourly, L=UNIT_LABELS[units];
  const single=(c.start===c.end);

  // chart
  document.getElementById('chart-title').textContent='Temperature';
  const series=[{name:'Temp',color:'#58a6ff',values:h.temperature_2m||[]}];
  if(h.apparent_temperature) series.push({name:'Feels',color:'#f78166',values:h.apparent_temperature});
  setLegend(series);
  Chart.setData({
    xFull:h.time.map(fullHour),
    xShort:h.time.map(t=> single ? hmShort(t) : mdShort(t)),
    series, yUnit:L.temp
  });

  // meta + table
  document.getElementById('results-meta').innerHTML=`<strong>${h.time.length} hours</strong> · ${c.lat.toFixed(3)}, ${c.lon.toFixed(3)} · ${c.start}${single?'':' → '+c.end} · ${d.timezone}`;
  const head=document.getElementById('results-head');
  let cols=`<th>Time</th><th>Temp (${L.temp})</th><th>Feels (${L.temp})</th><th>Humidity</th><th>Precip (${L.precip})</th><th>Rain chance</th><th>Wind (${L.wind})</th><th>Dir</th><th>Cloud</th><th>Vis (${L.vis})</th>`;
  if(heatMetrics) cols+=`<th>Heat idx (${L.temp})</th><th>Wet-bulb (${L.temp})</th><th>WBGT shade (${L.temp})</th>`;
  cols+=`<th>Conditions</th>`;
  head.innerHTML=`<tr>${cols}</tr>`;
  const colspan = heatMetrics ? 14 : 11;

  const tbody=document.getElementById('results-body'); tbody.innerHTML=''; let curDay=null;
  h.time.forEach((t,i)=>{
    const day=t.slice(0,10);
    if(day!==curDay){ curDay=day; const dr=document.createElement('tr'); dr.className='day-divider';
      dr.innerHTML=`<td colspan="${colspan}">${niceDateLong(day)}</td>`; tbody.appendChild(dr); }
    const temp=h.temperature_2m?.[i], feels=h.apparent_temperature?.[i], hum=h.relative_humidity_2m?.[i],
      precip=h.precipitation?.[i], pprob=h.precipitation_probability?.[i], wspd=h.windspeed_10m?.[i],
      wdir=h.winddirection_10m?.[i], cloud=h.cloudcover?.[i], vis=h.visibility?.[i], wmo=h.weathercode?.[i];
    const isRainy=precip!=null && precip>0;
    let row=`<td class="time-col">${hmShort(t)}</td>`+
      `<td class="temp-col ${tempClass(temp)}">${fmt(temp)}°</td>`+
      `<td class="temp-col ${tempClass(feels)}">${fmt(feels)}°</td>`+
      `<td>${fmt(hum,0)}%</td>`+
      `<td class="rain-col">${isRainy?fmt(precip,2):'<span class="dim">—</span>'}</td>`+
      `<td>${pprob!=null?fmt(pprob,0)+'%':'<span class="dim">—</span>'}</td>`+
      `<td class="wind-col">${fmt(wspd)}</td>`+
      `<td style="color:var(--subtle)">${wdir!=null?windDir(wdir):'—'}</td>`+
      `<td>${cloud!=null?fmt(cloud,0)+'%':'—'}</td>`+
      `<td>${visConvert(vis)}</td>`;
    if(heatMetrics){
      row+=`<td class="heat-col">${fmt(calcHeatIndex(temp,hum))}°</td>`+
           `<td class="heat-col">${fmt(calcWetBulb(temp,hum))}°</td>`+
           `<td class="heat-col">${fmt(calcWBGTshade(temp,hum))}°</td>`;
    }
    row+=`<td class="wmo-desc">${WMO[wmo] ?? (wmo ?? '—')}</td>`;
    const tr=document.createElement('tr'); tr.className='hour-row'; tr.innerHTML=row; tbody.appendChild(tr);
  });

  document.getElementById('legend-body').innerHTML=
    `<p><strong>Feels</strong> — apparent temperature from Open-Meteo: how the air feels once wind, humidity, and sun are accounted for. Behaves like wind chill in the cold and a humidity index in the heat.</p>`+
    `<p><strong>Heat index</strong> — U.S. NOAA "feels like" for warm, humid air, from temperature + humidity (shade, light wind assumed). Most meaningful above ~27°C / 80°F.</p>`+
    `<p><strong>Wet-bulb</strong> — lowest temperature reachable by evaporative (sweat) cooling at the current humidity. Computed from temperature + humidity (Stull 2011).</p>`+
    `<p><strong>WBGT (shade)</strong> — heat-stress index = 0.7×wet-bulb + 0.3×air temp, in shade with no solar load. A true outdoor WBGT (the flag / heat-category value) also needs globe temperature from direct sun, which isn't in this dataset — under full sun the real value runs higher than shown.</p>`;
  syncStickyOffset();
}

// ===== Daily =====

  document.getElementById('chart-title').textContent='Daily high / low';
  const series=[{name:'High',color:'#f78166',values:dd.temperature_2m_max||[]},
                {name:'Low',color:'#58a6ff',values:dd.temperature_2m_min||[]}];

  document.getElementById('results-meta').innerHTML=`<strong>${dd.time.length} days</strong> · ${c.lat.toFixed(3)}, ${c.lon.toFixed(3)} · ${c.start} → ${c.end} · ${d.timezone}`;
  document.getElementById('results-head').innerHTML=
    `<tr><th>Date</th><th>High (${L.temp})</th><th>Low (${L.temp})</th>`+
    `<th>Feels H/L (${L.temp})</th><th>Precip (${L.precip})</th><th>Rain hrs</th>`+
    `<th>Wind max (${L.wind})</th><th>Dir</th><th>Sun ↑ / ↓</th><th>Conditions</th></tr>`;
  const tbody=document.getElementById('results-body'); tbody.innerHTML='';
  dd.time.forEach((t,i)=>{
    const hi=dd.temperature_2m_max?.[i], lo=dd.temperature_2m_min?.[i],
      fmax=dd.apparent_temperature_max?.[i], fmin=dd.apparent_temperature_min?.[i],
      psum=dd.precipitation_sum?.[i], phrs=dd.precipitation_hours?.[i], wmax=dd.windspeed_10m_max?.[i],
      wdir=dd.winddirection_10m_dominant?.[i], wmo=dd.weathercode?.[i],
      sr=dd.sunrise?.[i], ss=dd.sunset?.[i];
    const tr=document.createElement('tr'); tr.className='hour-row';
    tr.innerHTML=`<td class="time-col">${compactDay(t)}</td>`+
      `<td class="temp-col ${tempClass(hi)}">${fmt(hi)}°</td>`+
      `<td class="temp-col ${tempClass(lo)}">${fmt(lo)}°</td>`+
      `<td class="temp-col">${fmt(fmax)}° / ${fmt(fmin)}°</td>`+
      `<td class="rain-col">${psum!=null&&psum>0?fmt(psum,1):'<span class="dim">—</span>'}</td>`+
      `<td>${phrs!=null?fmt(phrs,0):'—'}</td>`+
      `<td class="wind-col">${fmt(wmax)}</td>`+
      `<td style="color:var(--subtle)">${wdir!=null?windDir(wdir):'—'}</td>`+
      `<td style="color:var(--subtle)">${sr?hmShort(sr):'—'} / ${ss?hmShort(ss):'—'}</td>`+
      `<td class="wmo-desc">${WMO[wmo] ?? (wmo ?? '—')}</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById('legend-body').innerHTML=
    `<p><strong>High / Low</strong> — the day's maximum and minimum air temperature, measured at 2 m above ground.</p>`+
    `<p><strong>Feels (H/L)</strong> — the daily high and low of apparent temperature: Open-Meteo's estimate of how the air actually feels once wind, humidity, and solar radiation are folded in. It behaves like wind chill in the cold and like a humidity index in the heat, so a damp, sunny afternoon can read well above the air temperature and a windy winter morning well below it.</p>`+
    `<p><strong>Precip</strong> — total liquid-equivalent precipitation for the day (rain plus any melted snow or ice). <strong>Rain hrs</strong> is the number of hours with measurable precipitation, so the same total spread over fewer hours means heavier, more concentrated rain.</p>`+
    `<p><strong>Wind max / Dir</strong> — the day's peak 10 m wind speed and its dominant direction over the day (the compass point the wind blew <em>from</em>).</p>`+
    `<p><strong>Sun ↑ / ↓</strong> — sunrise and sunset in the location's local time.</p>`+
    `<p><strong>Conditions</strong> — the day's representative weather (WMO code), summarizing the dominant sky and precipitation state. Per-hour heat index, wet-bulb, and WBGT are available in the Hourly view. (Daily mean temperature and the separate feels max/min are still included in the CSV export.)</p>`;
  syncStickyOffset();
}

// ===== Summary =====
function statRow(k,v,cls=''){ return `<div class="stat"><span class="k">${k}</span><span class="v ${cls}">${v}</span></div>`; }
function argExtreme(arr, fn){ let bi=-1, bv=null; arr.forEach((v,i)=>{ if(v==null) return; if(bv==null||fn(v,bv)){ bv=v; bi=i; } }); return {i:bi,v:bv}; }

function renderSummary(d,c){
  const L=UNIT_LABELS[units]; const body=document.getElementById('summary-body'); let html='';
  if(c.effView==='daily'){
    const dd=d.daily;
    const hi=argExtreme(dd.temperature_2m_max||[], (a,b)=>a>b);
    const lo=argExtreme(dd.temperature_2m_min||[], (a,b)=>a<b);
    const totalP=(dd.precipitation_sum||[]).reduce((s,v)=>s+(v||0),0);
    const wet=argExtreme(dd.precipitation_sum||[], (a,b)=>a>b);
    const rainyDays=(dd.precipitation_sum||[]).filter(v=>v!=null&&v>0).length;
    if(hi.i>=0) html+=statRow('Highest', `${fmt(hi.v)}${L.temp} · ${mdShort(dd.time[hi.i])}`, 'hot');
    if(lo.i>=0) html+=statRow('Lowest', `${fmt(lo.v)}${L.temp} · ${mdShort(dd.time[lo.i])}`, 'cold');
    html+=statRow('Total precip', `${fmt(totalP,1)} ${L.precip}`, 'rain');
    if(wet.i>=0 && wet.v>0) html+=statRow('Wettest day', `${fmt(wet.v,1)} ${L.precip} · ${mdShort(dd.time[wet.i])}`, 'rain');
    html+=statRow('Days with rain', `${rainyDays} / ${dd.time.length}`);
  } else {
    const h=d.hourly;
    const hi=argExtreme(h.temperature_2m||[], (a,b)=>a>b);
    const lo=argExtreme(h.temperature_2m||[], (a,b)=>a<b);
    const totalP=(h.precipitation||[]).reduce((s,v)=>s+(v||0),0);
    const wind=argExtreme(h.windspeed_10m||[], (a,b)=>a>b);
    const hums=(h.relative_humidity_2m||[]).filter(v=>v!=null);
    const avgH=hums.length?hums.reduce((s,v)=>s+v,0)/hums.length:null;
    const single=(c.start===c.end);
    const stamp=i=> single ? hmShort(h.time[i]) : `${mdShort(h.time[i])} ${hmShort(h.time[i])}`;
    if(hi.i>=0) html+=statRow('High', `${fmt(hi.v)}${L.temp} · ${stamp(hi.i)}`, 'hot');
    if(lo.i>=0) html+=statRow('Low', `${fmt(lo.v)}${L.temp} · ${stamp(lo.i)}`, 'cold');
    html+=statRow('Total precip', `${fmt(totalP,1)} ${L.precip}`, 'rain');
    if(wind.i>=0) html+=statRow('Peak wind', `${fmt(wind.v)} ${L.wind} ${h.winddirection_10m?.[wind.i]!=null?windDir(h.winddirection_10m[wind.i]):''}`);
    if(avgH!=null) html+=statRow('Avg humidity', `${fmt(avgH,0)}%`);
  }
  body.innerHTML=html;
}

// ===== Location facts =====
function renderFacts(d,c){
  const L=UNIT_LABELS[units]; const body=document.getElementById('facts-body');
  const label=document.getElementById('loc-label').textContent.replace(/^📍\s*/,'');
  let html='';
  if(label) html+=statRow('Place', label.split(' · ')[0]);
  html+=statRow('Coordinates', `${c.lat.toFixed(3)}, ${c.lon.toFixed(3)}`);
  if(d.elevation!=null){ const e=units==='imperial'? Math.round(d.elevation*3.28084) : Math.round(d.elevation); html+=statRow('Elevation', `${e} ${L.elev}`); }
  if(d.timezone) html+=statRow('Time zone', `${d.timezone}${d.timezone_abbreviation?' ('+d.timezone_abbreviation+')':''}`);
  if(d.utc_offset_seconds!=null){ const off=d.utc_offset_seconds/3600; html+=statRow('UTC offset', `${off>=0?'+':''}${off}`); }
  body.innerHTML=html;
}

// Pin the day-divider rows just below the header by measuring the header's real height,
// rather than assuming a fixed pixel offset that breaks under zoom or larger fonts.
function syncStickyOffset(){
  const scroll=document.querySelector('.table-scroll');
  const head=document.getElementById('results-head');
  if(scroll && head) scroll.style.setProperty('--thead-h', head.offsetHeight+'px');
}

// ===== Records (all-time, calendar day) =====
function refDate(c){ return c ? (currentMode==='single' ? document.getElementById('single-date').value : c.start) : document.getElementById('single-date').value; }
function resetRecordsCard(){
  document.getElementById('records-body').innerHTML=`<button class="btn-records" id="btn-records">Load records</button><div class="records-note" id="records-note"></div>`;
  bindRecordsButton(); if(lastContext) updateRecordsButton(lastContext);
}
function updateRecordsButton(c){
  const btn=document.getElementById('btn-records'); if(!btn) return;
  if(!recordsLoaded){ btn.textContent=`Load records for ${monthDayLabel(refDate(c))}`; }
}
function bindRecordsButton(){
  const btn=document.getElementById('btn-records'); if(btn) btn.addEventListener('click', loadRecords);
}
bindRecordsButton();

async function loadRecords(){
  const c=lastContext;
  const lat=parseFloat(document.getElementById('lat-input').value);
  const lon=parseFloat(document.getElementById('lon-input').value);
  if(isNaN(lat)||isNaN(lon)){ setStatus('Pick a location first.',true); return; }
  const dateStr=refDate(c); const [,mm,dd]=dateStr.split('-'); const md=`${mm}-${dd}`;
  const body=document.getElementById('records-body');
  body.innerHTML=`<div class="records-note">Loading ~85 years of daily data for ${monthDayLabel(dateStr)}…</div>`;
  const u=UNIT_PARAMS[units];
  const p=new URLSearchParams({ latitude:lat, longitude:lon, timezone:'auto',
    start_date:'1940-01-01', end_date:todayStr(),
    daily:'temperature_2m_max,temperature_2m_min,precipitation_sum,windspeed_10m_max',
    temperature_unit:u.temperature_unit, windspeed_unit:u.windspeed_unit, precipitation_unit:u.precipitation_unit });
  let data;
  try{ const r=await fetch(`https://archive-api.open-meteo.com/v1/archive?${p}`); if(!r.ok) throw new Error(`HTTP ${r.status}`); data=await r.json(); }
  catch(e){ body.innerHTML=`<div class="records-note">Couldn't load records: ${e.message}</div><button class="btn-records" id="btn-records">Try again</button>`; bindRecordsButton(); return; }

  const dq=data.daily; if(!dq||!dq.time){ body.innerHTML=`<div class="records-note">No archive data available here.</div>`; return; }
  const idx=[]; dq.time.forEach((t,i)=>{ if(t.slice(5)===md) idx.push(i); });
  if(!idx.length){ body.innerHTML=`<div class="records-note">No matching days found.</div>`; return; }

  const yearOf=i=>dq.time[i].slice(0,4);
  // four temperature records: hottest & coldest of the daily highs, and of the daily lows
  let hiMax={v:-Infinity,y:null}, hiMin={v:Infinity,y:null}, loMax={v:-Infinity,y:null}, loMin={v:Infinity,y:null};
  let wet={v:-Infinity,y:null}, windy={v:-Infinity,y:null};
  let sumHi=0,nHi=0,sumLo=0,nLo=0;
  idx.forEach(i=>{
    const hi=dq.temperature_2m_max?.[i], lo=dq.temperature_2m_min?.[i], pr=dq.precipitation_sum?.[i], wd=dq.windspeed_10m_max?.[i];
    if(hi!=null){ if(hi>hiMax.v) hiMax={v:hi,y:yearOf(i)}; if(hi<hiMin.v) hiMin={v:hi,y:yearOf(i)}; sumHi+=hi; nHi++; }
    if(lo!=null){ if(lo>loMax.v) loMax={v:lo,y:yearOf(i)}; if(lo<loMin.v) loMin={v:lo,y:yearOf(i)}; sumLo+=lo; nLo++; }
    if(pr!=null && pr>wet.v) wet={v:pr,y:yearOf(i)};
    if(wd!=null && wd>windy.v) windy={v:wd,y:yearOf(i)};
  });
  const L=UNIT_LABELS[units];
  const years=idx.map(yearOf); const span=`${years[0]}–${years[years.length-1]}`;
  let html=`<div class="records-note" style="margin-bottom:.7rem">${monthDayLabel(dateStr)} · ${span} · ${nHi} yrs</div>`;
  if(hiMax.y) html+=statRow('Hottest high', `${fmt(hiMax.v)}${L.temp} (${hiMax.y})`, 'hot');
  if(hiMin.y) html+=statRow('Coldest high', `${fmt(hiMin.v)}${L.temp} (${hiMin.y})`, 'cold');
  if(loMax.y) html+=statRow('Hottest low', `${fmt(loMax.v)}${L.temp} (${loMax.y})`, 'hot');
  if(loMin.y) html+=statRow('Coldest low', `${fmt(loMin.v)}${L.temp} (${loMin.y})`, 'cold');
  if(nHi) html+=statRow('Avg high', `${fmt(sumHi/nHi)}${L.temp}`);
  if(nLo) html+=statRow('Avg low', `${fmt(sumLo/nLo)}${L.temp}`);
  if(wet.y && wet.v>0) html+=statRow('Wettest', `${fmt(wet.v,1)} ${L.precip} (${wet.y})`, 'rain');
  if(windy.y) html+=statRow('Windiest', `${fmt(windy.v)} ${L.wind} (${windy.y})`);
  body.innerHTML=html;
  recordsLoaded=true;
}

// ===== CSV =====
document.getElementById('btn-csv').addEventListener('click', downloadCSV);
function csvCell(v){ if(v==null) return ''; const s=String(v); return /[",\n]/.test(s)?`"${s.replace(/"/g,'""')}"`:s; }
function downloadCSV(){
  const d=lastWeatherData, c=lastContext; if(!d||!c) return;
  const L=UNIT_LABELS[units]; const T=L.temp.replace('°',''); const rows=[];
  if(c.effView==='daily'){
    const dd=d.daily;
    rows.push(['date',`high_${T}`,`low_${T}`,`mean_${T}`,`feels_max_${T}`,`feels_min_${T}`,`precip_${L.precip}`,'precip_hours',`wind_max_${L.wind}`,'wind_dir_deg_dominant','weathercode','sunrise','sunset']);
    dd.time.forEach((t,i)=>rows.push([t,dd.temperature_2m_max?.[i],dd.temperature_2m_min?.[i],dd.temperature_2m_mean?.[i],
      dd.apparent_temperature_max?.[i],dd.apparent_temperature_min?.[i],dd.precipitation_sum?.[i],dd.precipitation_hours?.[i],
      dd.windspeed_10m_max?.[i],dd.winddirection_10m_dominant?.[i],dd.weathercode?.[i],dd.sunrise?.[i],dd.sunset?.[i]]));
  } else {
    const h=d.hourly;
    const header=['time',`temp_${T}`,`feels_${T}`,'humidity_pct',`precip_${L.precip}`,'precip_prob_pct',`wind_${L.wind}`,'wind_dir_deg','cloud_pct','visibility_m','weathercode'];
    if(heatMetrics) header.push(`heat_index_${T}`,`wet_bulb_${T}`,`wbgt_shade_${T}`);
    rows.push(header);
    h.time.forEach((t,i)=>{
      const temp=h.temperature_2m?.[i], hum=h.relative_humidity_2m?.[i];
      const row=[t,temp,h.apparent_temperature?.[i],hum,h.precipitation?.[i],h.precipitation_probability?.[i],
        h.windspeed_10m?.[i],h.winddirection_10m?.[i],h.cloudcover?.[i],h.visibility?.[i],h.weathercode?.[i]];
      if(heatMetrics){ const hi=calcHeatIndex(temp,hum), wb=calcWetBulb(temp,hum), wg=calcWBGTshade(temp,hum);
        row.push(hi==null?null:hi.toFixed(1), wb==null?null:wb.toFixed(1), wg==null?null:wg.toFixed(1)); }
      rows.push(row);
    });
  }
  const csv=rows.map(r=>r.map(csvCell).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`weather_${c.lat.toFixed(3)}_${c.lon.toFixed(3)}_${c.start}_${c.end}_${c.effView}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ===== Interactive chart =====
const Chart = {
  canvas:null, ctx:null, wrap:null, tip:null, data:null, geom:null,
  init(){
    this.canvas=document.getElementById('chart'); this.ctx=this.canvas.getContext('2d');
    this.wrap=document.getElementById('chart-wrap'); this.tip=document.getElementById('chart-tip');
    this.canvas.addEventListener('mousemove', e=>this.onMove(e));
    this.canvas.addEventListener('mouseleave', ()=>this.hideTip());
    this.canvas.addEventListener('touchmove', e=>{ if(e.touches[0]){ this.onMove(e.touches[0]); e.preventDefault(); } }, {passive:false});
    this.canvas.addEventListener('touchend', ()=>this.hideTip());
  },
  setData(data){ this.data=data; this.render(); },
  render(hoverIdx=null){
    const d=this.data; if(!d) return;
    const cv=this.canvas, ctx=this.ctx;
    const W=cv.offsetWidth, H=cv.offsetHeight; if(!W||!H) return;
    const dpr=window.devicePixelRatio||1;
    // integer backing store so fractional DPRs (1.25, 1.5, 2.25…) don't blur
    cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0); ctx.clearRect(0,0,W,H);
    let vals=[]; d.series.forEach(s=>s.values.forEach(v=>{ if(v!=null) vals.push(v); }));
    if(!vals.length) return;
    let mn=Math.min(...vals), mx=Math.max(...vals); if(mn===mx){ mn-=1; mx+=1; }
    const step=niceStep(mx-mn,5);
    const yMin=Math.floor(mn/step)*step, yMax=Math.ceil(mx/step)*step;

    // type size tracks the document's root font (so it scales with zoom & user prefs)
    const rootPx=parseFloat(getComputedStyle(document.documentElement).fontSize)||16;
    const fs=Math.max(9, rootPx*0.7); this.fs=fs;
    ctx.font=`${fs}px 'IBM Plex Mono', monospace`;

    // left gutter is measured from the actual widest label, not a guessed constant
    let maxLabelW=0, guard=0;
    for(let v=yMin; v<=yMax+1e-9 && guard<400; v+=step, guard++){
      maxLabelW=Math.max(maxLabelW, ctx.measureText(`${Math.round(v)}${d.yUnit}`).width);
    }
    const padL=maxLabelW + fs*1.1, padR=fs*0.8, padT=fs*0.8, padB=fs*1.9;
    const plotL=padL, plotR=W-padR, plotT=padT, plotB=H-padB;
    const n=d.xFull.length;
    const xAt=i=> n>1 ? plotL+(i/(n-1))*(plotR-plotL) : (plotL+plotR)/2;
    const yAt=v=> plotB-((v-yMin)/(yMax-yMin))*(plotB-plotT);
    this.geom={plotL,plotR,plotT,plotB,n,xAt,yAt};
    const lineW=Math.max(1, fs/7), dotR=fs/3.2, dash=Math.max(2, fs/4);

    // y gridlines + labels
    ctx.textBaseline='middle'; ctx.textAlign='right'; guard=0;
    for(let v=yMin; v<=yMax+1e-9 && guard<400; v+=step, guard++){
      const y=yAt(v); ctx.strokeStyle='#21262d'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(plotL,y); ctx.lineTo(plotR,y); ctx.stroke();
      ctx.fillStyle='#8b949e'; ctx.fillText(`${Math.round(v)}${d.yUnit}`, plotL-fs*0.5, y);
    }
    // x ticks — count adapts to measured label width so they never overlap
    let widestX=0; d.xShort.forEach(l=>{ widestX=Math.max(widestX, ctx.measureText(l).width); });
    const maxTicks=Math.max(2, Math.floor((plotR-plotL)/(widestX + fs*1.5)));
    const ticks=Math.min(n, maxTicks, 8); ctx.textAlign='center'; ctx.textBaseline='top';
    for(let t=0;t<ticks;t++){ const i= ticks>1?Math.round(t/(ticks-1)*(n-1)):0;
      ctx.fillStyle='#8b949e'; ctx.fillText(d.xShort[i], xAt(i), plotB+fs*0.55); }
    // series lines
    d.series.forEach(s=>{ ctx.strokeStyle=s.color; ctx.lineWidth=lineW; ctx.lineJoin='round'; ctx.beginPath();
      let first=true; s.values.forEach((v,i)=>{ if(v==null){ first=true; return; } const x=xAt(i),y=yAt(v); first?ctx.moveTo(x,y):ctx.lineTo(x,y); first=false; }); ctx.stroke(); });
    // crosshair
    if(hoverIdx!=null && hoverIdx>=0 && hoverIdx<n){
      const x=xAt(hoverIdx); ctx.strokeStyle='rgba(139,148,158,.5)'; ctx.lineWidth=1; ctx.setLineDash([dash,dash]);
      ctx.beginPath(); ctx.moveTo(x,plotT); ctx.lineTo(x,plotB); ctx.stroke(); ctx.setLineDash([]);
      d.series.forEach(s=>{ const v=s.values[hoverIdx]; if(v==null) return; const y=yAt(v);
        ctx.fillStyle=s.color; ctx.beginPath(); ctx.arc(x,y,dotR,0,Math.PI*2); ctx.fill(); });
    }
  },
  onMove(ev){
    if(!this.data||!this.geom) return;
    const rect=this.canvas.getBoundingClientRect();
    const x=ev.clientX-rect.left; const {plotL,plotR,n}=this.geom;
    let idx = (plotR>plotL) ? Math.round((x-plotL)/(plotR-plotL)*(n-1)) : 0;
    idx=Math.max(0,Math.min(n-1,idx));
    this.render(idx); this.showTip(idx);
  },
  showTip(idx){
    const d=this.data; if(!d||!this.geom) return;
    let lines=`<div class="tip-x">${d.xFull[idx]}</div>`;
    d.series.forEach(s=>{ const v=s.values[idx];
      lines+=`<div class="tip-row"><span class="tip-dot" style="background:${s.color}"></span>${s.name}: <strong>${v==null?'—':v.toFixed(1)+d.yUnit}</strong></div>`; });
    this.tip.innerHTML=lines; this.tip.style.display='block';
    const x=this.geom.xAt(idx); const wrapW=this.wrap.clientWidth; const tipW=this.tip.offsetWidth;
    const off=(this.fs||12); let left=x+off; if(left+tipW>wrapW) left=x-tipW-off; if(left<0) left=0;
    this.tip.style.left=left+'px'; this.tip.style.top='0.4rem';
  },
  hideTip(){ this.tip.style.display='none'; if(this.data) this.render(); }
};
Chart.init();

let resizeTimer;
window.addEventListener('resize', ()=>{ clearTimeout(resizeTimer); resizeTimer=setTimeout(()=>{ if(lastWeatherData){ Chart.render(); syncStickyOffset(); } },150); });
</script>
